description: |
  UltraChip UC8253 EPD display controller.
  Used in WeAct Studio 3.7" E-Paper Module (GDEY037T03, 240x416).

compatible: "ultrachip,uc8253"

include: [mipi-dbi-spi-device.yaml, display-controller.yaml]

properties:
  busy-gpios:
    type: phandle-array
    required: true
    description: |
      BUSY pin. LOW while the controller is busy, HIGH when ready.
      Configure as GPIO_ACTIVE_LOW so gpio_pin_get_dt returns 1 when busy.

  psr:
    type: uint8-array
    default: [0x1F, 0x0D]
    description: |
      Panel Setting Register (PSR) value, 2 bytes.
      Default 0x1F 0x0D matches the GDEY037T03 3.7" panel
      (from GxEPD2_370_GDEY037T03 reference driver).
      Byte 0 bit 4 (RSEL): 1=BW only mode.
      Byte 1: VCOM and data interval settings.
